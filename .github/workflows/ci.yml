name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: "1.95.0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      # &checkout / &rust-cache are defined here and reused via *aliases below.
      # YAML anchors are file-local and can't override fields (no merge keys), so
      # only the byte-identical steps are shared; rust-toolchain/install-action
      # vary per job and stay inline.
      - &checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - &rust-cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: just
      # Confirm the pin won over rust-toolchain.toml's "stable" (see RUSTUP_TOOLCHAIN).
      - run: rustc --version
      - run: just lint

  test:
    name: test (native)
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
      - *rust-cache
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: just,cargo-hack
      - run: rustc --version
      - run: just test-native
      # trybuild's `ui` suite leaves a nested target tree under target/tests that
      # rust-cache's post-step cleanup trips over (ENOENT opendir). Drop it here;
      # the docs/examples steps below don't need it.
      - run: rm -rf target/tests
      - run: just docs
      - run: just examples

  wasm:
    name: test (wasm32)
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
          targets: wasm32-unknown-unknown
      - *rust-cache
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26"
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: just,cargo-hack,wasm-bindgen-cli@0.2.122
      - run: just test-wasm
