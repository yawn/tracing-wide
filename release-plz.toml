# release-plz configuration — https://release-plz.dev/docs/config
[workspace]
# CHANGELOG.md is hand-written (curated prose), so release-plz must not touch
# it. The release PR only bumps versions + the macros `=` pin.
changelog_update = false
# Guard the bump with cargo-semver-checks: a breaking API change forces the
# correct (pre-1.0: minor) bump even when the commit wasn't marked breaking.
semver_check = true

# tracing-wide and tracing-wide-macros are one unit (the `=` pin between them):
# always the same version, always bumped and released together.
[[package]]
name = "tracing-wide"
version_group = "tracing-wide"

[[package]]
name = "tracing-wide-macros"
version_group = "tracing-wide"
