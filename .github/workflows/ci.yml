name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: "1.95.0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      # Confirm the pin won over rust-toolchain.toml's "stable" (see RUSTUP_TOOLCHAIN).
      - run: rustc --version
      - run: just lint

  test:
    name: test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-hack
      - run: rustc --version
      - run: just test-native
      - run: just docs
      - run: just examples

  wasm:
    name: test (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-hack,wasm-bindgen-cli@0.2.122
      - run: just test-wasm
