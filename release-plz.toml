# release-plz configuration — https://release-plz.dev/docs/config
[workspace]
changelog_update = false
semver_check = true
git_release_enable = false

# tracing-wide and tracing-wide-macros are one unit (the `=` pin between them):
# always the same version, always bumped and released together.
[[package]]
name = "tracing-wide"
version_group = "tracing-wide"

[[package]]
name = "tracing-wide-macros"
version_group = "tracing-wide"
