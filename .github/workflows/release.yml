name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  # Maintains the release PR: bumps the workspace version + the macros `=` pin.
  # Never publishes. (changelog_update is off — CHANGELOG.md is hand-written.)
  release-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    # event == 'push' is a security guard, not a convenience: workflow_run runs
    # with write + crates.io OIDC creds, and `branches: [main]` matches the head
    # *branch* — a fork PR from a branch named "main" would otherwise satisfy it.
    # Fork-PR CI carries event 'pull_request'; only base-repo pushes are 'push'.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    permissions:
      contents: write # push the release-PR branch
      pull-requests: write # open/update the release PR
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After the release PR merges: publishes the unpublished crates (macros first)
  # via OIDC trusted publishing, tags, and cuts the GitHub Release. A no-op on
  # every other push, until a version bump reaches main.
  release:
    name: release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    permissions:
      contents: write # push the tag + create the GitHub Release
      pull-requests: read # detect the merged release PR
      id-token: write # OIDC -> crates.io trusted publishing; no token secret
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
